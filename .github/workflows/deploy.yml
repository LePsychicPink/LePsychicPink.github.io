name: Deploy Hexo Blog

on:
  push:
    branches:
      - main # Triggers the build every time you push code to main
  schedule:
    - cron: "0 0 * * *" # Automatically runs once every 24 hours (Midnight UTC)
  workflow_dispatch: # Enables the manual "Run workflow" button in GitHub

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the parent repository AND pull the cross-account submodule files
      - name: Checkout Blog Repo
        uses: actions/checkout@v4
        with:
          # 🟢 Authenticates against Account A using your saved repository secret
          token: ${{ secrets.SUBMODULE_TOKEN }}
          submodules: "true" # Automatically clones your source/_posts/shared repo
          fetch-depth: 0 # Fetches full history so Git tracking works seamlessly

      # 2. Set up a secure, stable Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm" # Caches npm dependencies to speed up future builds

      # 3. Clean install your project dependencies (including hexo-blog-encrypt)
      - name: Install Dependencies
        run: |
          npm ci

      # 4. Wipe old caches, pull the latest submodule commits, and generate the static HTML
      - name: Clear Cache and Generate Site
        run: |
          # Forces the runner to grab the newest markdown files across the account boundary
          git submodule update --init --recursive --remote 
          npx hexo clean
          npx hexo generate
          touch ./public/.nojekyll                         # Bypasses Jekyll so Hexo assets don't break

      # 5. Push the compiled 'public' folder contents to your live deployment branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          # Uses GitHub's built-in token to write back to Account B's gh-pages branch
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public # Deploy the output directory generated by Hexo
          publish_branch: gh-pages # The branch GitHub Pages hosts your live site from
