name: Deploy Hexo Blog

on:
  push:
    branches:
      - main # Triggers the build every time you push to main
  workflow_dispatch: # Keeps your manual "Run workflow" button active

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Blog Repo
        uses: actions/checkout@v4
        with:
          submodules: "true" # Automatically pulls shared submodules if you use them

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Uses a stable Node environment
          cache: "npm"

      - name: Install Dependencies
        run: |
          npm ci

      - name: Clear Cache and Generate Site
        run: |
          npx hexo clean
          npx hexo generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # Built-in token; no setup required
          publish_dir: ./public # Deploys your compiled Hexo public folder
          publish_branch: gh-pages # Sends the public files to the gh-pages branch
